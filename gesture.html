<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Language App - Gesture Recognition</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #f0f8ff;
      height: 100%;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      background-color: white;
      display: flex;
      flex-direction: column;
      padding-bottom: 60px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      border-bottom: 1px solid #ddd;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
    }

    .content {
      flex-grow: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .video-container {
      background-color: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 14;
      margin-bottom: 2px;
      top: -10px;
    }

    #camera-feed, #hand-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center;
    }

    .flipped {
      transform: scaleX(-1);
    }

    #hand-canvas {
      z-index: 1;
      pointer-events: none;
      background: transparent;
    }

    .toggle-button {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background-color: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      z-index: 10;
    }

    .loading-indicator {
      text-align: center;
      margin-top: 10px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .translation-box {
      background-color: #f0f0f0;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 10px;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }

    .translation-box small {
      color: #666;
      font-size: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .control-item {
      background-color: #e0e0e0;
      padding: 9px;
      border-radius: 10px;
      text-align: center;
    }

    .control-item h3 {
      margin: 1px 0;
      font-size: 10px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid #ddd;
      z-index: 1000;
    }

    .footer a {
      text-decoration: none;
      color: #888;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .footer a img {
      width: 24px;
      height: 24px;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="images/deafy logo.png" style="width: 30px; height: 30px;" />
      <h2>Sign to Text</h2>
      <h2></h2>
    </div>

    <div class="content">
      <div class="video-container">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="hand-canvas"></canvas>
        <button class="toggle-button" id="toggle-camera">Switch Camera</button>
      </div>

      <div class="loading-indicator" id="loading-spinner">
        <div class="spinner"></div>
        <p style="font-size: 12px; color: #555;">Loading AI...</p>
      </div>

      <div class="translation-box" id="translation-output">
        <div>Translation</div>
        <small id="translation-hint">Show a hand sign clearly in the frame</small>
      </div>

      <div class="controls">
        <div class="control-item">
          <a href="gesture2.html" style="text-decoration: none; color: black;">
            <img src="images/swap.png" style="width: 20px; height: 20px;" />
            <h3>Change Mode</h3>
          </a>
        </div>
        <div class="control-item">
          <a href="offline.html" style="text-decoration: none; color: black;">
            <img src="images/language.png" style="width: 20px; height: 20px;" />
            <h3>Language Options</h3>
          </a>
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="home.html"><img src="images/home.png" />Home</a>
      <a href="courses.html"><img src="images/to-do-list.png" />Courses</a>
      <a href="profile.html"><img src="images/user.png" />Profile</a>
    </div>
  </div>

  <!-- MediaPipe Scripts -->
  <script src="assets/mediapipe/camera_utils/camera_utils.js"></script>
  <script src="assets/mediapipe/control_utils/control_utils.js"></script>
  <script src="assets/mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="assets/mediapipe/hands/hands.js"></script>

  <script>
    const videoElement = document.getElementById('camera-feed');
    const canvasElement = document.getElementById('hand-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const translationOutput = document.getElementById('translation-output');
    const translationHint = document.getElementById('translation-hint');
    const loadingSpinner = document.getElementById('loading-spinner');
    const toggleBtn = document.getElementById('toggle-camera');

    let currentFacingMode = 'environment';
    let stream = null;
    let cameraInstance = null;
    let videoDevices = [];
    let usingDeviceId = null;
    let isProcessingFrame = false;
    let lastProcessedAt = 0;
    const PROCESS_EVERY_MS = 80; // lower = smoother, higher = less lag

    // Keep recent predictions so the translation does not flicker.
    const predictionHistory = [];
    const HISTORY_SIZE = 8;

    const hands = new Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    // Lower complexity and single-hand mode help reduce lag on mobile.
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    function setTranslation(label, hint = '') {
      translationOutput.firstElementChild.textContent = label;
      translationHint.textContent = hint;
    }

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function averagePoint(points) {
      const total = points.reduce((acc, p) => ({ x: acc.x + p.x, y: acc.y + p.y }), { x: 0, y: 0 });
      return { x: total.x / points.length, y: total.y / points.length };
    }

    function getFingerState(landmarks, handedness = 'Right') {
      const wrist = landmarks[0];
      const thumbTip = landmarks[4];
      const thumbIp = landmarks[3];
      const indexTip = landmarks[8], indexPip = landmarks[6], indexMcp = landmarks[5];
      const middleTip = landmarks[12], middlePip = landmarks[10], middleMcp = landmarks[9];
      const ringTip = landmarks[16], ringPip = landmarks[14], ringMcp = landmarks[13];
      const pinkyTip = landmarks[20], pinkyPip = landmarks[18], pinkyMcp = landmarks[17];

      const isExtended = (tip, pip, mcp) => tip.y < pip.y && pip.y < mcp.y;
      const isCurled = (tip, pip) => tip.y > pip.y;

      // Thumb works better using x direction and distance from palm center.
      const palmCenter = averagePoint([landmarks[0], landmarks[5], landmarks[9], landmarks[13], landmarks[17]]);
      const thumbFarFromPalm = distance(thumbTip, palmCenter) > distance(thumbIp, palmCenter) * 1.1;
      const thumbExtended = handedness === 'Left'
        ? thumbTip.x > thumbIp.x && thumbFarFromPalm
        : thumbTip.x < thumbIp.x && thumbFarFromPalm;

      return {
        thumb: thumbExtended,
        index: isExtended(indexTip, indexPip, indexMcp),
        middle: isExtended(middleTip, middlePip, middleMcp),
        ring: isExtended(ringTip, ringPip, ringMcp),
        pinky: isExtended(pinkyTip, pinkyPip, pinkyMcp),
        curled: {
          index: isCurled(indexTip, indexPip),
          middle: isCurled(middleTip, middlePip),
          ring: isCurled(ringTip, ringPip),
          pinky: isCurled(pinkyTip, pinkyPip)
        }
      };
    }

    function detectGesture(landmarks, handedness = 'Right') {
      if (!landmarks || landmarks.length < 21) return null;

      const fingers = getFingerState(landmarks, handedness);
      const thumbTip = landmarks[4];
      const indexTip = landmarks[8];
      const middleTip = landmarks[12];
      const ringTip = landmarks[16];
      const pinkyTip = landmarks[20];
      const wrist = landmarks[0];

      const indexMiddleGap = distance(indexTip, middleTip);
      const thumbIndexGap = distance(thumbTip, indexTip);
      const thumbIndexNear = thumbIndexGap < 0.05;
      const indexPointingUp = indexTip.y < landmarks[6].y && indexTip.y < wrist.y;
      const thumbAboveWrist = thumbTip.y < wrist.y - 0.08;
      const thumbBelowWrist = thumbTip.y > wrist.y + 0.08;
      const allOpen = fingers.thumb && fingers.index && fingers.middle && fingers.ring && fingers.pinky;
      const noThumbNeededOpenPalm = fingers.index && fingers.middle && fingers.ring && fingers.pinky;
      const fist = !fingers.index && !fingers.middle && !fingers.ring && !fingers.pinky && !fingers.thumb;

      // 1) Hello / Open Hand
      if (allOpen || noThumbNeededOpenPalm) {
        return { text: '👋 Hello / Open Hand', raw: 'open_palm' };
      }

      // 2) Peace
      if (fingers.index && fingers.middle && !fingers.ring && !fingers.pinky && indexMiddleGap > 0.04) {
        return { text: '✌️ Peace', raw: 'peace' };
      }

      // 3) Pointing / One
      if (fingers.index && !fingers.middle && !fingers.ring && !fingers.pinky && !fingers.thumb && indexPointingUp) {
        return { text: '☝️ Point / One', raw: 'point' };
      }

      // 4) Thumbs Up
      if (fingers.thumb && !fingers.index && !fingers.middle && !fingers.ring && !fingers.pinky && thumbAboveWrist) {
        return { text: '👍 Thumbs Up', raw: 'thumbs_up' };
      }

      // 5) Thumbs Down
      if (fingers.thumb && !fingers.index && !fingers.middle && !fingers.ring && !fingers.pinky && thumbBelowWrist) {
        return { text: '👎 Thumbs Down', raw: 'thumbs_down' };
      }

      // 6) Fist / Stop
      if (fist) {
        return { text: '✊ Fist', raw: 'fist' };
      }

      // 7) Call Me
      if (fingers.thumb && !fingers.index && !fingers.middle && !fingers.ring && fingers.pinky) {
        return { text: '🤙 Call Me', raw: 'call_me' };
      }

      // 8) Rock Sign
      if (!fingers.thumb && fingers.index && !fingers.middle && !fingers.ring && fingers.pinky) {
        return { text: '🤘 Rock Sign', raw: 'rock' };
      }

      // 9) OK Sign
      if (thumbIndexNear && fingers.middle && fingers.ring && fingers.pinky) {
        return { text: '👌 OK', raw: 'ok' };
      }

      // 10) Three
      if (!fingers.thumb && fingers.index && fingers.middle && fingers.ring && !fingers.pinky) {
        return { text: '3️⃣ Three', raw: 'three' };
      }

      // 11) Four
      if (!fingers.thumb && fingers.index && fingers.middle && fingers.ring && fingers.pinky) {
        return { text: '4️⃣ Four', raw: 'four' };
      }

      // 12) I Love You
      if (fingers.thumb && fingers.index && !fingers.middle && !fingers.ring && fingers.pinky) {
        return { text: '🤟 I Love You', raw: 'ily' };
      }

      return null;
    }

    function smoothPrediction(prediction) {
      if (!prediction) {
        predictionHistory.push('none');
      } else {
        predictionHistory.push(prediction.raw);
      }

      if (predictionHistory.length > HISTORY_SIZE) {
        predictionHistory.shift();
      }

      const counts = {};
      for (const item of predictionHistory) {
        counts[item] = (counts[item] || 0) + 1;
      }

      let best = 'none';
      let bestCount = 0;
      for (const key in counts) {
        if (counts[key] > bestCount) {
          best = key;
          bestCount = counts[key];
        }
      }

      if (bestCount < 3 || best === 'none') return null;

      const labelMap = {
        open_palm: '👋 Hello / Open Hand',
        peace: '✌️ Peace',
        point: '☝️ Point / One',
        thumbs_up: '👍 Thumbs Up',
        thumbs_down: '👎 Thumbs Down',
        fist: '✊ Fist',
        call_me: '🤙 Call Me',
        rock: '🤘 Rock Sign',
        ok: '👌 OK',
        three: '3️⃣ Three',
        four: '4️⃣ Four',
        ily: '🤟 I Love You'
      };

      return labelMap[best] || null;
    }

    function clearCanvas() {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    }

    function onResults(results) {
      loadingSpinner.style.display = 'none';
      clearCanvas();

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const handedness = results.multiHandedness?.[0]?.label || 'Right';

        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
          color: '#00FF88',
          lineWidth: 3
        });

        drawLandmarks(canvasCtx, landmarks, {
          color: '#FF3B30',
          lineWidth: 1,
          radius: 3
        });

        const prediction = detectGesture(landmarks, handedness);
        const stablePrediction = smoothPrediction(prediction);

        if (stablePrediction) {
          setTranslation(stablePrediction, 'Gesture recognized');
        } else if (prediction) {
          setTranslation(prediction.text, 'Stabilizing prediction...');
        } else {
          setTranslation('Detecting...', 'Try centering one hand in the frame');
        }
      } else {
        predictionHistory.push('none');
        if (predictionHistory.length > HISTORY_SIZE) predictionHistory.shift();
        setTranslation('Translation', 'Show a hand sign clearly in the frame');
      }

      isProcessingFrame = false;
    }

    function applyMirrorMode(facingMode) {
      const shouldMirror = facingMode === 'user';
      videoElement.classList.toggle('flipped', shouldMirror);
      canvasElement.classList.toggle('flipped', shouldMirror);
    }

    async function getAvailableVideoDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      videoDevices = devices.filter(device => device.kind === 'videoinput');
      return videoDevices;
    }

    function pickBestRearCamera(devices) {
      return devices.find(device => /back|rear|environment/gi.test(device.label)) || null;
    }

    function pickBestFrontCamera(devices) {
      return devices.find(device => /front|user|facetime/gi.test(device.label)) || null;
    }

    async function stopCurrentCamera() {
      if (cameraInstance) {
        cameraInstance.stop();
        cameraInstance = null;
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    async function startCamera(facingMode = 'environment') {
      try {
        loadingSpinner.style.display = 'block';
        await stopCurrentCamera();

        // Ask once for permission so labels become available on mobile browsers.
        const warmupStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        warmupStream.getTracks().forEach(track => track.stop());

        const devices = await getAvailableVideoDevices();
        const preferredDevice = facingMode === 'environment'
          ? pickBestRearCamera(devices)
          : pickBestFrontCamera(devices);

        const constraints = preferredDevice
          ? {
              video: {
                deviceId: { exact: preferredDevice.deviceId },
                width: { ideal: 640 },
                height: { ideal: 480 }
              },
              audio: false
            }
          : {
              video: {
                facingMode: { ideal: facingMode },
                width: { ideal: 640 },
                height: { ideal: 480 }
              },
              audio: false
            };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        usingDeviceId = preferredDevice ? preferredDevice.deviceId : null;
        videoElement.srcObject = stream;
        currentFacingMode = facingMode;
        applyMirrorMode(facingMode);

        await new Promise(resolve => {
          videoElement.onloadedmetadata = () => {
            canvasElement.width = videoElement.videoWidth || 640;
            canvasElement.height = videoElement.videoHeight || 480;
            resolve();
          };
        });

        cameraInstance = new Camera(videoElement, {
          onFrame: async () => {
            const now = performance.now();
            if (isProcessingFrame || now - lastProcessedAt < PROCESS_EVERY_MS) return;
            isProcessingFrame = true;
            lastProcessedAt = now;
            await hands.send({ image: videoElement });
          },
          width: 640,
          height: 480
        });

        cameraInstance.start();
      } catch (error) {
        console.warn(`Could not access ${facingMode} camera:`, error);

        // Fallback to the opposite camera if the first one fails.
        if (facingMode === 'environment') {
          currentFacingMode = 'user';
          await startCamera('user');
        } else {
          loadingSpinner.style.display = 'none';
          setTranslation('Camera Error', 'Please allow camera access in your browser settings');
          alert("Unable to access camera. Please check your device's permissions.");
        }
      }
    }

    toggleBtn.addEventListener('click', async () => {
      const nextMode = currentFacingMode === 'user' ? 'environment' : 'user';
      await startCamera(nextMode);
    });

    window.addEventListener('beforeunload', () => {
      stopCurrentCamera();
    });

    startCamera(currentFacingMode);
  </script>
</body>
</html>
